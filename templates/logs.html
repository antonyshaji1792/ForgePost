<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Logs - Forge Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --accent-color: #ec4899;
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            background-color: var(--dark-bg);
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        pre {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 70vh;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg glass-panel mx-3 mt-3 mb-5 px-4">
        <a class="navbar-brand" href="/"><i class="fas fa-video me-2"></i>Forge Post</a>
        <div class="ms-auto d-flex align-items-center">
            <a href="/" class="nav-link text-white me-3"><i class="fas fa-home me-1"></i> Editor</a>
            <a href="/gallery" class="nav-link text-white me-3"><i class="fas fa-images me-1"></i> Gallery</a>
            <a href="/social" class="nav-link text-white me-3"><i class="fas fa-share-nodes me-1"></i> Social</a>
            <a href="/history" class="nav-link text-white me-3"><i class="fas fa-history me-1"></i> History</a>
            <a href="/logs" class="nav-link text-white me-3 active"><i class="fas fa-list-alt me-1"></i> Logs</a>
            <a href="/settings" class="nav-link text-white me-3"><i class="fas fa-cog me-1"></i> Settings</a>
            <span class="text-white me-3"><i class="fas fa-user me-2"></i>{{ user }}</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-panel p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3><i class="fas fa-list-alt me-2"></i>System Logs</h3>
                <a href="/logs" class="btn btn-outline-light btn-sm"><i class="fas fa-sync me-2"></i>Refresh</a>
            </div>

            {% if logs %}
            <pre>{{ logs }}</pre>
            {% else %}
            <div class="alert alert-info border-secondary bg-transparent text-secondary">
                No logs available yet.
            </div>
            {% endif %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
